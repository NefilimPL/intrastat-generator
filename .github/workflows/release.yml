name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  actions: read
  contents: write

env:
  PYTHONUTF8: "1"
  PYTHONIOENCODING: "utf-8"

jobs:
  check-self-hosted:
    name: Check self-hosted runner availability
    runs-on: ubuntu-latest
    outputs:
      available: ${{ steps.check.outputs.available }}
      checked: ${{ steps.check.outputs.checked }}
      reason: ${{ steps.check.outputs.reason }}
    steps:
      - uses: actions/checkout@v4
      - name: Check repository runners
        id: check
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RUNNER_CHECK_TOKEN: ${{ secrets.RUNNER_CHECK_TOKEN }}
        run: python .github/scripts/check_self_hosted_runner.py

  build-self-hosted:
    name: Build on self-hosted Windows runner
    needs: check-self-hosted
    if: needs.check-self-hosted.outputs.available != 'false'
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Prepare build version
        run: |
          $ErrorActionPreference = "Stop"
          $refName = "${{ github.ref_name }}"
          $refType = "${{ github.ref_type }}"
          $branch = $refName
          if ($refType -eq "tag") {
            $branches = @(git branch -r --contains HEAD |
              ForEach-Object { $_.Trim() } |
              Where-Object { $_ -like "origin/*" -and $_ -notlike "origin/HEAD*" } |
              ForEach-Object { $_ -replace "^origin/", "" })
            foreach ($preferred in @("Main", "main", "dev")) {
              if ($branches -contains $preferred) {
                $branch = $preferred
                break
              }
            }
            if (-not $branch -or $branch -eq $refName) {
              $branch = $branches | Select-Object -First 1
            }
            if (-not $branch) {
              $branch = "unknown"
            }
          }
          $branchSafe = ($branch -replace "[^A-Za-z0-9_.-]+", "-").Trim("-")
          if (-not $branchSafe) {
            $branchSafe = "unknown"
          }
          if ($refType -eq "tag" -and $refName.StartsWith("v")) {
            $version = "$refName-$branchSafe"
          } else {
            $version = "0.0.0-$branchSafe"
          }
          "INTRASTAT_GENERATOR_BRANCH=$branchSafe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "INTRASTAT_GENERATOR_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Build version: $version"
      - name: Select existing Python
        run: |
          $ErrorActionPreference = "Stop"
          Write-Host "PowerShell edition: $($PSVersionTable.PSEdition)"
          Write-Host "PowerShell version: $($PSVersionTable.PSVersion)"
          $candidates = @()
          $pyLauncher = Get-Command py -ErrorAction SilentlyContinue
          if ($pyLauncher) {
            try {
              $candidate = & py -3.11 -c "import sys; print(sys.executable)"
              if ($LASTEXITCODE -eq 0 -and $candidate) {
                $candidates += $candidate.Trim()
              }
            } catch {
            }
          }
          $pythonCommand = Get-Command python -ErrorAction SilentlyContinue
          if ($pythonCommand) {
            $candidates += $pythonCommand.Source
          }
          foreach ($candidate in ($candidates | Select-Object -Unique)) {
            try {
              & "$candidate" -c "import sys, tkinter; raise SystemExit(0 if sys.version_info >= (3, 11) else 1)"
              if ($LASTEXITCODE -eq 0) {
                "PYTHON_EXE=$candidate" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                & "$candidate" --version
                exit 0
              }
            } catch {
            }
          }
          throw "Python 3.11 or newer with Tkinter is required on the self-hosted runner. Install it and add it to PATH."
      - name: Embed runtime build info
        run: |
          Write-Host "Writing src/intrastat_generator/_build_info.py"
          & "$env:PYTHON_EXE" .github/scripts/embed_build_info.py
      - name: Install dependencies
        run: |
          & "$env:PYTHON_EXE" -m pip install --upgrade pip
          & "$env:PYTHON_EXE" -m pip install -r requirements-dev.txt
          & "$env:PYTHON_EXE" -m pip install -e .
      - name: Run tests
        run: '& "$env:PYTHON_EXE" -m pytest'
      - name: Generate EXE metadata
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path build | Out-Null
          $version = $env:INTRASTAT_GENERATOR_VERSION
          $numeric = [regex]::Match($version, "v?(\d+)\.(\d+)\.(\d+)")
          if ($numeric.Success) {
            $fileTuple = "$($numeric.Groups[1].Value), $($numeric.Groups[2].Value), $($numeric.Groups[3].Value), 0"
          } else {
            $fileTuple = "0, 0, 0, 0"
          }
          @"
          VSVersionInfo(
            ffi=FixedFileInfo(
              filevers=($fileTuple),
              prodvers=($fileTuple),
              mask=0x3f,
              flags=0x0,
              OS=0x40004,
              fileType=0x1,
              subtype=0x0,
              date=(0, 0)
            ),
            kids=[
              StringFileInfo([
                StringTable(
                  '041504B0',
                  [
                    StringStruct('Comments', 'License: MIT; Authors: NefilimPL and contributors'),
                    StringStruct('CompanyName', 'NefilimPL and contributors'),
                    StringStruct('FileDescription', 'Generator INTRASTAT XLSX'),
                    StringStruct('FileVersion', '$version'),
                    StringStruct('InternalName', 'intrastat-generator'),
                    StringStruct('LegalCopyright', 'Copyright (c) 2026 NefilimPL and contributors'),
                    StringStruct('OriginalFilename', 'intrastat-generator.exe'),
                    StringStruct('ProductName', 'Generator INTRASTAT XLSX'),
                    StringStruct('ProductVersion', '$version')
                  ]
                )
              ]),
              VarFileInfo([VarStruct('Translation', [1045, 1200])])
            ]
          )
          "@ | Set-Content -Path build/version_info.txt -Encoding UTF8
      - name: Stage bundled resources
        run: |
          $ErrorActionPreference = "Stop"
          $resourceRoot = "build/pyinstaller-resources"
          Remove-Item -Recurse -Force -Path $resourceRoot -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $resourceRoot | Out-Null
          function Copy-MissingTree {
            param(
              [string] $Source,
              [string] $Destination
            )
            if (-not (Test-Path -LiteralPath $Source -PathType Container)) {
              return
            }
            New-Item -ItemType Directory -Force -Path $Destination | Out-Null
            $sourcePath = (Resolve-Path -LiteralPath $Source).Path.TrimEnd([char[]]"\/")
            Get-ChildItem -LiteralPath $Source -Recurse -File | ForEach-Object {
              $relative = $_.FullName.Substring($sourcePath.Length).TrimStart([char[]]"\/")
              $target = Join-Path $Destination $relative
              if (-not (Test-Path -LiteralPath $target -PathType Leaf)) {
                New-Item -ItemType Directory -Force -Path (Split-Path -Parent $target) | Out-Null
                Copy-Item -LiteralPath $_.FullName -Destination $target
              }
            }
          }
          $dictionarySources = @(Get-ChildItem -LiteralPath . -Directory |
            Where-Object {
              @(Get-ChildItem -LiteralPath $_.FullName -Recurse -File -Filter "slownik*.xml" -ErrorAction SilentlyContinue).Count -gt 0
            })
          foreach ($source in $dictionarySources) {
            Copy-MissingTree -Source $source.FullName -Destination "$resourceRoot/Slowniki"
          }
          $stagedDictionaryFiles = @(Get-ChildItem -LiteralPath "$resourceRoot/Slowniki" -Recurse -File -Filter "slownik*.xml" -ErrorAction SilentlyContinue)
          if ($stagedDictionaryFiles.Count -eq 0) {
            throw "Bundled dictionary XML files were not staged. Check repository dictionary folder contents before building the EXE."
          }
          foreach ($source in @("Taryfa", "taryfa")) {
            Copy-MissingTree -Source $source -Destination "$resourceRoot/Taryfa"
          }
      - name: Build EXE
        run: |
          $addData = @()
          if (Test-Path "build/pyinstaller-resources/Slowniki") { $addData += @("--add-data", "build/pyinstaller-resources/Slowniki;Slowniki") }
          if (Test-Path "build/pyinstaller-resources/Taryfa") { $addData += @("--add-data", "build/pyinstaller-resources/Taryfa;Taryfa") }
          & "$env:PYTHON_EXE" -m PyInstaller --onefile --windowed --name intrastat-generator --paths src --version-file build/version_info.txt @addData src/intrastat_generator/__main__.py
          & "$env:PYTHON_EXE" -c "from pathlib import Path; from intrastat_generator.naming import build_release_exe_name; Path('dist/intrastat-generator.exe').rename(Path('dist') / build_release_exe_name('$env:INTRASTAT_GENERATOR_VERSION'))"
      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Intrastat-Generator_*_Windows_x64.exe
          generate_release_notes: true
          draft: true
      - name: Upload artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: intrastat-generator-windows-x64
          path: dist/Intrastat-Generator_*_Windows_x64.exe

  build-github-hosted:
    name: Build on GitHub-hosted Windows runner
    needs: [check-self-hosted, build-self-hosted]
    if: always() && (needs.check-self-hosted.outputs.available == 'false' || needs.build-self-hosted.result == 'failure' || needs.build-self-hosted.result == 'cancelled')
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Prepare build version
        run: |
          $ErrorActionPreference = "Stop"
          $refName = "${{ github.ref_name }}"
          $refType = "${{ github.ref_type }}"
          $branch = $refName
          if ($refType -eq "tag") {
            $branches = @(git branch -r --contains HEAD |
              ForEach-Object { $_.Trim() } |
              Where-Object { $_ -like "origin/*" -and $_ -notlike "origin/HEAD*" } |
              ForEach-Object { $_ -replace "^origin/", "" })
            foreach ($preferred in @("Main", "main", "dev")) {
              if ($branches -contains $preferred) {
                $branch = $preferred
                break
              }
            }
            if (-not $branch -or $branch -eq $refName) {
              $branch = $branches | Select-Object -First 1
            }
            if (-not $branch) {
              $branch = "unknown"
            }
          }
          $branchSafe = ($branch -replace "[^A-Za-z0-9_.-]+", "-").Trim("-")
          if (-not $branchSafe) {
            $branchSafe = "unknown"
          }
          if ($refType -eq "tag" -and $refName.StartsWith("v")) {
            $version = "$refName-$branchSafe"
          } else {
            $version = "0.0.0-$branchSafe"
          }
          "INTRASTAT_GENERATOR_BRANCH=$branchSafe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "INTRASTAT_GENERATOR_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Build version: $version"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Embed runtime build info
        run: |
          Write-Host "Writing src/intrastat_generator/_build_info.py"
          python .github/scripts/embed_build_info.py
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -e .
      - name: Run tests
        run: python -m pytest
      - name: Generate EXE metadata
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path build | Out-Null
          $version = $env:INTRASTAT_GENERATOR_VERSION
          $numeric = [regex]::Match($version, "v?(\d+)\.(\d+)\.(\d+)")
          if ($numeric.Success) {
            $fileTuple = "$($numeric.Groups[1].Value), $($numeric.Groups[2].Value), $($numeric.Groups[3].Value), 0"
          } else {
            $fileTuple = "0, 0, 0, 0"
          }
          @"
          VSVersionInfo(
            ffi=FixedFileInfo(
              filevers=($fileTuple),
              prodvers=($fileTuple),
              mask=0x3f,
              flags=0x0,
              OS=0x40004,
              fileType=0x1,
              subtype=0x0,
              date=(0, 0)
            ),
            kids=[
              StringFileInfo([
                StringTable(
                  '041504B0',
                  [
                    StringStruct('Comments', 'License: MIT; Authors: NefilimPL and contributors'),
                    StringStruct('CompanyName', 'NefilimPL and contributors'),
                    StringStruct('FileDescription', 'Generator INTRASTAT XLSX'),
                    StringStruct('FileVersion', '$version'),
                    StringStruct('InternalName', 'intrastat-generator'),
                    StringStruct('LegalCopyright', 'Copyright (c) 2026 NefilimPL and contributors'),
                    StringStruct('OriginalFilename', 'intrastat-generator.exe'),
                    StringStruct('ProductName', 'Generator INTRASTAT XLSX'),
                    StringStruct('ProductVersion', '$version')
                  ]
                )
              ]),
              VarFileInfo([VarStruct('Translation', [1045, 1200])])
            ]
          )
          "@ | Set-Content -Path build/version_info.txt -Encoding UTF8
      - name: Stage bundled resources
        run: |
          $ErrorActionPreference = "Stop"
          $resourceRoot = "build/pyinstaller-resources"

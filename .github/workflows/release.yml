              return
            }
            New-Item -ItemType Directory -Force -Path $Destination | Out-Null
            $sourcePath = (Resolve-Path -LiteralPath $Source).Path.TrimEnd([char[]]"\/")
            Get-ChildItem -LiteralPath $Source -Recurse -File | ForEach-Object {
              $relative = $_.FullName.Substring($sourcePath.Length).TrimStart([char[]]"\/")
              $target = Join-Path $Destination $relative
              if (-not (Test-Path -LiteralPath $target -PathType Leaf)) {
                New-Item -ItemType Directory -Force -Path (Split-Path -Parent $target) | Out-Null
                Copy-Item -LiteralPath $_.FullName -Destination $target
              }
            }
          }
          $dictionarySources = @(Get-ChildItem -LiteralPath . -Directory |
            Where-Object {
              @(Get-ChildItem -LiteralPath $_.FullName -Recurse -File -Filter "slownik*.xml" -ErrorAction SilentlyContinue).Count -gt 0
            })
          foreach ($source in $dictionarySources) {
            Copy-MissingTree -Source $source.FullName -Destination "$resourceRoot/Slowniki"
          }
          $stagedDictionaryFiles = @(Get-ChildItem -LiteralPath "$resourceRoot/Slowniki" -Recurse -File -Filter "slownik*.xml" -ErrorAction SilentlyContinue)
          if ($stagedDictionaryFiles.Count -eq 0) {
            throw "Bundled dictionary XML files were not staged. Check repository dictionary folder contents before building the EXE."
          }
          foreach ($source in @("Taryfa", "taryfa")) {
            Copy-MissingTree -Source $source -Destination "$resourceRoot/Taryfa"

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  actions: read
  contents: write

env:
  PYTHONUTF8: "1"
  PYTHONIOENCODING: "utf-8"

jobs:
  check-self-hosted:
    name: Check self-hosted runner availability
    runs-on: ubuntu-latest
    outputs:
      available: ${{ steps.check.outputs.available }}
      checked: ${{ steps.check.outputs.checked }}
      reason: ${{ steps.check.outputs.reason }}
    steps:
      - uses: actions/checkout@v4
      - name: Check repository runners
        id: check
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RUNNER_CHECK_TOKEN: ${{ secrets.RUNNER_CHECK_TOKEN }}
        run: python .github/scripts/check_self_hosted_runner.py

  build-self-hosted:
    name: Build on self-hosted Windows runner
    needs: check-self-hosted
    if: needs.check-self-hosted.outputs.available != 'false'
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 30
    env:
      INTRASTAT_GENERATOR_VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - name: Select existing Python
        run: |
          $ErrorActionPreference = "Stop"
          Write-Host "PowerShell edition: $($PSVersionTable.PSEdition)"
          Write-Host "PowerShell version: $($PSVersionTable.PSVersion)"
          $candidates = @()
          $pyLauncher = Get-Command py -ErrorAction SilentlyContinue
          if ($pyLauncher) {
            try {
              $candidate = & py -3.11 -c "import sys; print(sys.executable)"
              if ($LASTEXITCODE -eq 0 -and $candidate) {
                $candidates += $candidate.Trim()
              }
            } catch {
            }
          }
          $pythonCommand = Get-Command python -ErrorAction SilentlyContinue
          if ($pythonCommand) {
            $candidates += $pythonCommand.Source
          }
          foreach ($candidate in ($candidates | Select-Object -Unique)) {
            try {
              & "$candidate" -c "import sys, tkinter; raise SystemExit(0 if sys.version_info >= (3, 11) else 1)"
              if ($LASTEXITCODE -eq 0) {
                "PYTHON_EXE=$candidate" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                & "$candidate" --version
                exit 0
              }
            } catch {
            }
          }
          throw "Python 3.11 or newer with Tkinter is required on the self-hosted runner. Install it and add it to PATH."
      - name: Install dependencies
        run: |
          & "$env:PYTHON_EXE" -m pip install --upgrade pip
          & "$env:PYTHON_EXE" -m pip install -r requirements-dev.txt
          & "$env:PYTHON_EXE" -m pip install -e .
      - name: Run tests
        run: '& "$env:PYTHON_EXE" -m pytest'
      - name: Build EXE
        run: |
          & "$env:PYTHON_EXE" -m PyInstaller --onefile --windowed --name intrastat-generator --paths src src/intrastat_generator/__main__.py
          & "$env:PYTHON_EXE" -c "from pathlib import Path; from intrastat_generator.naming import build_release_exe_name; Path('dist/intrastat-generator.exe').rename(Path('dist') / build_release_exe_name('${{ github.ref_name }}'))"
      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Intrastat-Generator_*_Windows_x64.exe
          generate_release_notes: true
          draft: true
      - name: Upload artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: intrastat-generator-windows-x64
          path: dist/Intrastat-Generator_*_Windows_x64.exe

  build-github-hosted:
    name: Build on GitHub-hosted Windows runner
    needs: [check-self-hosted, build-self-hosted]
    if: always() && (needs.check-self-hosted.outputs.available == 'false' || needs.build-self-hosted.result == 'failure' || needs.build-self-hosted.result == 'cancelled')
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      INTRASTAT_GENERATOR_VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -e .
      - name: Run tests
        run: python -m pytest
      - name: Build EXE
        run: |
          python -m PyInstaller --onefile --windowed --name intrastat-generator --paths src src/intrastat_generator/__main__.py
          python -c "from pathlib import Path; from intrastat_generator.naming import build_release_exe_name; Path('dist/intrastat-generator.exe').rename(Path('dist') / build_release_exe_name('${{ github.ref_name }}'))"
      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Intrastat-Generator_*_Windows_x64.exe
          generate_release_notes: true
          draft: true
      - name: Upload artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: intrastat-generator-windows-x64
          path: dist/Intrastat-Generator_*_Windows_x64.exe
